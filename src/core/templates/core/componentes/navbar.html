<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'core:index' %}">Django</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="{% url 'core:dados' %}">Tirar datos</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'core:usuarios' %}">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'cliente:index' %}">App Cliente</a></li>
                {% if user.is_authenticated %}
                    <li class="nav-item"><a class="nav-link" href="{% url 'producto:index' %}">Productos</a></li>
                {% endif %}
            </ul>

            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-2">
                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'core:profile' %}">{{ user.username }}</a>
                    </li>
                    {% if user.vendedor.avatar %}
                        <li class="nav-item d-flex align-items-center">
                            <img src="{{ user.vendedor.avatar.url }}" alt="avatar" class="rounded-circle" style="height: 32px; width: 32px; object-fit: cover;">
                        </li>
                    {% endif %}
                    <li class="nav-item">
                        <form action="{% url 'core:logout' %}" method="post" class="d-flex m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
                        </form>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="btn btn-primary btn-sm" href="{% url 'core:login' %}">Login</a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
