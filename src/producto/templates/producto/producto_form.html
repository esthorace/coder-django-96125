{% extends 'core/base.html' %}

{% block contenido %}
    {% if form.instance.pk %}
        <h1>Editar Producto</h1>
    {% else %}
        <h1>Crear Producto</h1>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <table>
            {{ form.as_table }}
        </table>
        <button type="submit">Enviar</button>
    </form>
    <button>
        <a href="{% url 'producto:producto_list' %}">Volver</a>
    </button>
{% endblock contenido %}
