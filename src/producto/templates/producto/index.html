{% extends 'core/base.html' %}


{% block contenido %}
    <h1>Productos</h1>

    <button><a href="{% url 'producto:categoriaproducto_create' %}">Crear Categoria</a></button>

    <form action="" method="get">
        <input type="text" name="consulta" id="" placeholder="Buscar...">
        <button type="submit">Buscar</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for producto in productos %}
                <tr>
                    <td>{{ producto.id }} {{ producto.nombre }}</td>
                    <td class="action-links">
                        <a href="{% url 'producto:categoriaproducto_detail' producto.id %}" title="Ver"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></a>
                        <a href="{% url 'producto:categoriaproducto_update' producto.id %}" title="Editar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></a>
                        <a href="#" title="Borrar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></a>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="2">No hay registros</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>

{% endblock contenido %}
