{% extends 'core/base.html' %}

{% block contenido %}
    <h1>Eliminar Categoría de Producto</h1>
    <p>¿Está seguro que desea eliminar <strong>{{ object.nombre }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
    </form>
    <a href="{% url 'producto:categoria_list' %}">Cancelar</a>
{% endblock contenido %}
