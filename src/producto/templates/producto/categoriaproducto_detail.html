{% extends 'core/base.html' %}

{% block contenido %}
    <h1>Detalle de Categoría de Producto</h1>
    <ul>
        <li><strong>Nombre:</strong> {{ object.nombre }}</li>
        {% if object.descripcion %}
            <li><strong>Descripcion:</strong> {{ object.descripcion }}</li>
        {% else %}
            <li><strong>Descripcion:</strong> -</li>
        {% endif %}
    </ul>
{% endblock contenido %}
