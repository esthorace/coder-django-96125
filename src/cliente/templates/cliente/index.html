{% extends 'core/base.html' %}

{% block contenido %}
    <div class="py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h2">App Cliente</h1>
                <p class="text-muted mb-0">Listado de clientes registrados</p>
            </div>
        </div>

        <div class="list-group shadow-sm">
            {% for cliente in clientes %}
                <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    <span>{{ cliente.apellido|upper }}, {{ cliente.nombre }}</span>
                    <span class="badge bg-primary rounded-pill">Cliente</span>
                </div>
            {% empty %}
                <div class="list-group-item text-muted">No hay clientes registrados.</div>
            {% endfor %}
        </div>
    </div>
{% endblock contenido %}
